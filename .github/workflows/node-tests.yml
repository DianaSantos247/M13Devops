name: Node.js Unit Tests

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: main-server

    steps:
      - name: 1. Fazer checkout do repositório
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: main-server/package-lock.json

      - name: 3. Instalar dependências
        run: npm ci

      - name: 4. Correr testes com cobertura
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: data/tickets_test.db
          PORT: 3000
